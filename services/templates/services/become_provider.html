{% extends "base.html" %}
{% block title %}Become a Provider | Local Service Finder{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="panel fade-in">
            <div class="mb-4">
                <span class="feature-icon mb-3"><i class="bi bi-person-plus"></i></span>
                <h1 class="section-title h2">Become a Provider</h1>
                <p class="muted mb-0">Submit your profile for administrator approval. Once approved, clients can send requests for your services.</p>
            </div>
            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}
                <div class="row g-3">
                    <div class="col-md-6"><label class="form-label">Phone</label><input type="text" name="phone" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label">Location</label><input type="text" name="location" class="form-control" required></div>
                    <div class="col-md-6"><label class="form-label">Hourly rate / price guide</label><input type="number" step="0.01" name="hourly_rate" class="form-control"></div>
                    <div class="col-md-6"><label class="form-label">Profile image</label><input type="file" name="profile_image" class="form-control"></div>
                    <div class="col-12"><label class="form-label">Credentials</label><textarea name="credentials" class="form-control" rows="4" placeholder="Licenses, experience, certifications"></textarea></div>
                    <div class="col-12"><label class="form-label">Portfolio</label><textarea name="portfolio" class="form-control" rows="4" placeholder="Past projects, links, references"></textarea></div>
                    <div class="col-12"><label class="form-label">Availability</label><textarea name="availability" class="form-control" rows="3" placeholder="Example: Weekdays 8am-5pm"></textarea></div>
                </div>
                <button class="btn btn-primary mt-4" type="submit">Submit Application</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
