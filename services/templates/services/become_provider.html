{% extends "base.html" %}
{% block content %}

<h2 style="color: #007bff; margin-bottom: 20px;">Register as a Provider</h2>

<form method="POST" enctype="multipart/form-data" style="background-color:#f7f9fc; padding:20px; border-radius:10px; max-width:400px;">
    {% csrf_token %}
    <label>Phone Number:</label><br>
    <input type="text" name="phone" placeholder="Enter phone number" style="width:100%; padding:8px; margin-bottom:10px; border-radius:5px; border:1px solid #ccc;"><br>

    <label>Work Area / Location:</label><br>
    <input type="text" name="location" placeholder="Enter your work area" style="width:100%; padding:8px; margin-bottom:10px; border-radius:5px; border:1px solid #ccc;" required><br>

    <label>Credentials:</label><br>
    <textarea name="credentials" placeholder="Training, licenses, experience" style="width:100%; padding:8px; margin-bottom:10px; border-radius:5px; border:1px solid #ccc;"></textarea><br>

    <label>Portfolio:</label><br>
    <textarea name="portfolio" placeholder="Examples of previous work" style="width:100%; padding:8px; margin-bottom:10px; border-radius:5px; border:1px solid #ccc;"></textarea><br>

    <label>Hourly Rate / Price Guide:</label><br>
    <input type="number" step="0.01" name="hourly_rate" placeholder="Example: 1500" style="width:100%; padding:8px; margin-bottom:10px; border-radius:5px; border:1px solid #ccc;"><br>

    <label>Availability:</label><br>
    <textarea name="availability" placeholder="Example: Mon-Sat, 8am-6pm" style="width:100%; padding:8px; margin-bottom:10px; border-radius:5px; border:1px solid #ccc;"></textarea><br>

    <label>Profile Picture:</label><br>
    <input type="file" name="profile_image" style="margin-bottom:10px;"><br>

    <button type="submit" style="background-color:#007bff; color:white; border:none; padding:10px 15px; border-radius:5px;">Register</button>
</form>

{% endblock %}
